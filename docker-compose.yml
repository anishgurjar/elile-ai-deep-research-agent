name: ${COMPOSE_PROJECT_NAME:-elileai}

services:
  # ===================
  # Unified Postgres Database
  # ===================
  postgres:
    image: postgres:16
    container_name: ${COMPOSE_PROJECT_NAME:-elileai}-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: elileai
      POSTGRES_USER: elileai
      POSTGRES_PASSWORD: elileai_dev
    ports:
      - "${ELILEAI_POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U elileai"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ===================
  # Neo4j Graph Database
  # ===================
  neo4j:
    image: neo4j:5-enterprise
    container_name: ${COMPOSE_PROJECT_NAME:-elileai}-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/${ELILEAI_NEO4J_PASSWORD:-neo4j_dev}
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "${ELILEAI_NEO4J_HTTP_PORT:-7474}:7474"
      - "${ELILEAI_NEO4J_BOLT_PORT:-7687}:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ===================
  # Neo4j Read-Only User Init (one-shot)
  # ===================
  neo4j-init:
    image: neo4j:5-enterprise
    container_name: ${COMPOSE_PROJECT_NAME:-elileai}-neo4j-init
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      ELILEAI_NEO4J_URI: bolt://neo4j:7687
      ELILEAI_NEO4J_USERNAME: neo4j
      ELILEAI_NEO4J_PASSWORD: ${ELILEAI_NEO4J_PASSWORD:-neo4j_dev}
    volumes:
      - ./infrastructure/neo4j:/init:ro
    entrypoint: ["/bin/bash", "/init/init-readonly.sh"]
    restart: "no"

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
